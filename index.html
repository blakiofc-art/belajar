<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr. Bushido | Blakiofc | Future Tech</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="overlay"></div>
    
    <main class="container">
        <header class="hero">
            <h1 class="title">MR. BUSHIDO</h1>
            <p class="role">Lead Architect at Blakiofc</p>
        </header>
        
        <section class="glass-card">
            <h2>BLAKIOFC</h2>
            <p>Mendorong batasan teknologi web dari jantung <strong>Kupang, NTT</strong>. Kami menciptakan solusi digital masa depan dengan presisi, integritas, dan keahlian teknis.</p>
            
            <div class="stats">
                <div class="stat-item"><span>Inovasi</span></div>
                <div class="stat-item"><span>Teknologi</span></div>
                <div class="stat-item"><span>Kupang</span></div>
            </div>
            
            <button class="btn-primary" onclick="alert('Menghubungkan ke Blakiofc...')">Hubungi Kami</button>
        </section>
        <section class="glass-card" style="margin-top: 20px;">
    <h2>Kalkulator Target Tabungan</h2>
    <div class="input-group">
        <input type="number" id="target" placeholder="Target Uang (Rp)">
        <input type="number" id="bulan" placeholder="Jumlah Bulan">
        <button class="btn-primary" onclick="hitungTabungan()">Hitung</button>
    </div>
    <div id="hasil" style="margin-top: 20px; font-weight: bold;"></div>
</section>
    </main>
    <script>
    // 1. Memuat data saat halaman pertama kali dibuka
    window.onload = function() {
        const savedData = localStorage.getItem('tabunganData');
        if (savedData) {
            document.getElementById('hasil').innerHTML = `Riwayat Terakhir: ${savedData}`;
        }
    };

    function hitungTabungan() {
        const target = document.getElementById('target').value;
        const bulan = document.getElementById('bulan').value;
        const hasil = document.getElementById('hasil');

        if (target && bulan) {
            const perBulan = (target / bulan).toLocaleString('id-ID');
            const pesan = `Anda perlu menabung: Rp ${perBulan} / bulan`;
            
            // 2. Menampilkan hasil
            hasil.innerHTML = pesan;
            
            // 3. Menyimpan ke Local Storage agar tidak hilang saat refresh
            localStorage.setItem('tabunganData', pesan);
        } else {
            alert("Harap isi semua kolom!");
        }
    }
    
    // Opsional: Fungsi untuk reset data
    function resetData() {
        localStorage.removeItem('tabunganData');
        document.getElementById('hasil').innerHTML = "Data telah dihapus.";
    }
</script>
</body>
</html>
